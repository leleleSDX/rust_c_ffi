# max optimmizations for dependencies
[profile.dev.package."*"]
opt-level = 3
incremental = false

# small optimization in debug mode
[profile.dev]
opt-level = 0
incremental = false

# custom cache wrapper
[build]
#rustc-wrapper = "sccache"

# custom linker
[target.x86_64-unknown-linux-gnu]
#linker = "clang"
#rustflags = ["-C", "link-arg=-fuse-ld=lld"]

